<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .Title }} | ARIES Science Club</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        /* --- THE LIGHTBOX (For clicking images) --- */
        #lightbox {
            display: none; position: fixed; z-index: 9999;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); /* ARIES dark background */
            align-items: center; justify-content: center;
            flex-direction: column;
        }
        #lightbox img { max-width: 90%; max-height: 80vh; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #lightbox-caption { color: white; margin-top: 15px; font-size: 1.2rem; }
        #lightbox-close {
            position: absolute; top: 30px; right: 40px;
            color: white; font-size: 3rem; cursor: pointer; transition: color 0.2s;
        }
        #lightbox-close:hover { color: var(--primary, #e11d48); }
    </style>
</head>
<body>
    
    {{ partial "navbar.html" . }}

    <div class="breadcrumbs">
        <a href="/">Home</a> <span>/</span> 
        <a href="/#events">Upcoming Events</a> <span>/</span> 
        <span style="color: #f8fafc;">{{ .Title }}</span>
    </div>

    <section style="padding-top: 20px; max-width: 1200px; margin: 0 auto; display: block;" data-aos="fade-up">
        
        <div style="width: 100%; height: 350px; border-radius: 20px; overflow: hidden; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <img src="{{ .Params.cover_image }}" alt="{{ .Title }}" style="width: 100%; height: 100%; object-fit: cover; cursor: pointer;" onclick="openLightbox('{{ .Params.cover_image }}', '{{ .Title }}')" />
        </div>

        <h1 style="font-size: 3rem; margin-bottom: 5px;">{{ .Title }}</h1>
        <h3 style="color: var(--primary); margin-top: 0; margin-bottom: 30px;">
            📅 {{ .Date.Format "Monday, January 2, 2006" }}
        </h3>

        <div style="color: #cbd5e1; line-height: 1.8; font-size: 1.1rem; background: rgba(255,255,255,0.03); padding: 40px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05);">
            {{ .Content }}
        </div>

        <div style="text-align: center; margin-top: 40px;">
            <a href="mailto:club@aries.res.in?subject=RSVP: {{ .Title }}" class="btn" style="padding: 15px 50px; font-size: 1.2rem;">
                RSVP / Register Now
            </a>
        </div>

    </section>

    {{ partial "footer.html" . }}
    
    <div id="lightbox" onclick="closeLightbox()">
        <span id="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Full Screen Photo">
        <div id="lightbox-caption"></div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/js/main.js"></script>
    <script>
        // --- LIGHTBOX ENGINE ---
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');

        function openLightbox(imageSrc, captionText) {
            if (!lightbox) return;
            lightboxImg.src = imageSrc;
            lightboxCaption.innerText = captionText;
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden'; 
        }

        function closeLightbox() {
            if (!lightbox) return;
            lightbox.style.display = 'none';
            document.body.style.overflow = 'auto'; 
        }
    </script>
</body>
</html>
