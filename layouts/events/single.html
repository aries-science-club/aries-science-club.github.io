<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .Title }} | ARIES Science Club</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    
    {{ partial "navbar.html" . }}

    <div class="breadcrumbs">
        <a href="/">Home</a> <span>/</span> 
        <a href="/#events">Upcoming Events</a> <span>/</span> 
        <span style="color: #f8fafc;">{{ .Title }}</span>
    </div>

    <section style="padding-top: 20px; max-width: 900px; margin: 0 auto; display: block;">
        
        <div style="width: 100%; height: 350px; border-radius: 20px; overflow: hidden; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <img src="{{ .Params.image }}" alt="{{ .Title }}" style="width: 100%; height: 100%; object-fit: cover;" />
        </div>

        <h1 style="font-size: 3rem; margin-bottom: 5px;">{{ .Title }}</h1>
        <h3 style="color: var(--primary); margin-top: 0; margin-bottom: 30px;">
            📅 {{ .Date.Format "Monday, January 2, 2006" }}
        </h3>

        <div style="color: #cbd5e1; line-height: 1.8; font-size: 1.1rem; background: rgba(255,255,255,0.03); padding: 40px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05);">
            {{ .Content }}
        </div>

        <div style="text-align: center; margin-top: 40px;">
            <a href="mailto:club@aries.res.in?subject=RSVP: {{ .Title }}" class="btn" style="padding: 15px 50px; font-size: 1.2rem;">
                RSVP / Register Now
            </a>
        </div>

    </section>

    {{ partial "footer.html" . }}
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
